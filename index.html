<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/portada-campeones.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e1a" />
    <title>Porra Mundial 2026</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        background: #0a0e1a;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Consola de debug para móvil (Eruda).
      Solo se carga si la URL contiene ?debug=1 (ej: https://miapp.com/?debug=1).
      Aparece un botón flotante con engranaje ⚙ abajo a la derecha al pulsarlo se abre la consola.
    -->
    <script>
      (function() {
        var qs = new URLSearchParams(window.location.search);
        if (qs.get('debug') === '1' || window.localStorage.getItem('eruda_debug') === '1') {
          // Persistir entre redirects (Google sale y vuelve)
          window.localStorage.setItem('eruda_debug', '1');
          var s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/eruda';
          s.onload = function() { window.eruda && window.eruda.init(); };
          document.head.appendChild(s);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
